{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "rag-platform.fullname" . }}
  labels:
    {{- include "rag-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "rag-platform.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- with .Values.networkPolicy.ingressNamespaceSelector }}
        - namespaceSelector:
            {{- toYaml . | nindent 12 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Allow DNS resolution.
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow egress to the vector store and outbound HTTPS (LLM/embeddings API).
    - to: []
      ports:
        - protocol: TCP
          port: 6333
        - protocol: TCP
          port: 443
{{- end }}
