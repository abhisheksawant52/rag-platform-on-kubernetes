name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 1. Python lint (ruff + black)
  # ──────────────────────────────────────────────
  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: pip install ruff black

      - name: Ruff
        run: ruff check src tests

      - name: Black
        run: black --check src tests

  # ──────────────────────────────────────────────
  # 2. Python tests (3.11 / 3.12)
  # ──────────────────────────────────────────────
  test:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest-asyncio

      - name: Run tests
        run: pytest

  # ──────────────────────────────────────────────
  # 3. Helm chart lint
  # ──────────────────────────────────────────────
  helm:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.2

      - name: Helm lint
        run: helm lint helm

      - name: Helm template (render check)
        run: helm template rag-platform helm --set secrets.openaiApiKey=dummy > /dev/null

  # ──────────────────────────────────────────────
  # 4. Docker image build
  # ──────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ghcr.io/your-org/rag-platform:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
