apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rag-production

resources:
  - ../../base

commonLabels:
  environment: production

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: rag-platform
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: rag.example.com
    target:
      kind: Ingress
      name: rag-platform

images:
  - name: ghcr.io/your-org/rag-platform
    newTag: latest
