apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rag-staging

resources:
  - ../../base

namePrefix: staging-

commonLabels:
  environment: staging

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: rag-platform
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: rag-staging.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: rag-staging.example.com
    target:
      kind: Ingress
      name: rag-platform

images:
  - name: ghcr.io/your-org/rag-platform
    newTag: staging
