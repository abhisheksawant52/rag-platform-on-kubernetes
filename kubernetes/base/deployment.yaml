apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-platform
  labels:
    app: rag-platform
    app.kubernetes.io/name: rag-platform
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: rag-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-platform
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # zero-downtime deploys
  template:
    metadata:
      labels:
        app: rag-platform
        app.kubernetes.io/name: rag-platform
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: rag-platform
      # Security hardening at pod level
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      # Spread replicas across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: rag-platform
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: ghcr.io/your-org/rag-platform:latest    # overridden per environment
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          # Security hardening at container level
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Resource limits prevent noisy-neighbour issues
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
            - name: VECTOR_STORE_URL
              value: "http://qdrant:6333"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-platform-secrets
                  key: openai-api-key
          # Probes
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          # Writable tmp dir for uvicorn worker files (read-only root FS)
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
